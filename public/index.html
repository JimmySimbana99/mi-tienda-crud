<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Tienda Mami Dita</title>
    <style>
        /* Estilos Base */
        body { 
            display: flex; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            background: #f0f2f5; 
            flex-direction: row; /* Por defecto para PC */
        }

        /* Sidebar Responsive */
        #sidebar { 
            width: 260px; 
            background: #2c3e50; 
            color: white; 
            padding: 20px; 
            flex-shrink: 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        #sidebar h2 { font-size: 1.1rem; text-align: center; margin-bottom: 20px; }

        .nav-item { 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            transition: 0.3s; 
            font-size: 14px;
            font-weight: 600;
        }
        .nav-item:hover { background: #34495e; }

        /* Contenedor Principal */
        #main { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            width: 100%;
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            max-width: 900px;
            margin: auto;
        }

        /* Inputs y Botones */
        input { 
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
        }

        button { 
            padding: 10px 15px; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold;
            color: white;
        }

        .btn-save { background: #3498db; width: 100%; margin-top: 10px; }
        .btn-update { background: #27ae60; }
        .btn-edit { background: #f39c12; margin-bottom: 5px; }
        .btn-del { background: #e74c3c; }
        .btn-cancel { background: #95a5a6; }

        /* TABLAS RESPONSIVE */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 20% auto; padding: 25px; width: 85%; max-width: 320px; border-radius: 12px; text-align: center; }

        /* --- AQUÍ ESTÁ EL TRUCO PARA CELULAR --- */
        @media (max-width: 768px) {
            body { flex-direction: column; } /* Menú arriba, contenido abajo */
            
            #sidebar { 
                width: 100%; 
                padding: 10px; 
                display: flex; 
                flex-direction: column; 
                align-items: center;
            }
            
            #sidebar h2 { margin-bottom: 10px; font-size: 1rem; }
            #sidebar hr { width: 80%; }

            .nav-item { 
                width: 90%; 
                padding: 10px; 
                margin-bottom: 5px; 
                text-align: center; 
                font-size: 12px;
            }

            #main { padding: 15px; }
            .card { padding: 15px; }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>TIENDA MAMI DITA</h2>
    <hr>
    <div class="nav-item" onclick="ver('form')">➕ INSERTAR</div>
    <div class="nav-item" onclick="ver('lista')">👁️ VISUALIZAR</div>
    <div class="nav-item" onclick="ver('actualizar')">🔄 ACTUALIZAR</div>
</div>

<div id="main">
    <div id="sec-form" class="card">
        <h3>Nuevo Producto</h3>
        <input type="text" id="nom" placeholder="Nombre">
        <input type="number" id="pre" placeholder="Precio">
        <input type="number" id="can" placeholder="Cantidad">
        <button class="btn-save" onclick="guardar()">Guardar en Inventario</button>
    </div>

    <div id="sec-lista" class="card" style="display:none">
        <h3>Inventario Total</h3>
        <input type="text" id="busqueda" placeholder="🔍 Buscar..." oninput="listar()">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-actualizar" class="card" style="display:none">
        <h3>Actualizar Tienda</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaActualizar"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h3 id="modalNombre"></h3>
        <p>Stock: <span id="modalStock"></span></p>
        <input type="number" id="cambioStock" placeholder="Ej: 5 o -3">
        <div style="margin-top:15px">
            <button class="btn-update" onclick="procesarCambio()">Aplicar</button>
            <button class="btn-cancel" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
</div>

<div id="modalEditar" class="modal">
    <div class="modal-content">
        <h3>Editar</h3>
        <p id="editNombre" style="font-weight:bold"></p>
        <input type="number" id="editPrecio" step="0.01" placeholder="Precio">
        <input type="number" id="editStock" placeholder="Stock">
        <div style="margin-top:15px">
            <button class="btn-update" onclick="guardarEdicionCompleta()">Guardar</button>
            <button class="btn-cancel" onclick="cerrarModalEditar()">Cerrar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
